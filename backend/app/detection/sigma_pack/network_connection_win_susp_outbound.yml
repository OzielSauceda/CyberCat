title: Suspicious Outbound Connection on Known C2 Ports
id: network-connection-win-susp-outbound
status: test
description: Detects outbound network connections to ports commonly used by C2
  frameworks and remote-access tools (4444, 5555, 8888, 1337, 31337).
logsource:
  category: network_connection
  product: windows
detection:
  selection:
    DestinationPort:
      - "4444"
      - "5555"
      - "8888"
      - "1337"
      - "31337"
  condition: selection
level: medium
tags:
  - attack.command-and-control
  - attack.t1571
