title: Remote Logon with Explicit Credentials
id: logon-remote-explicit-credentials
status: test
description: Detects network logons where explicit credentials are passed (Type 10 / RunAs),
  which can indicate lateral movement or credential relay attacks.
logsource:
  category: authentication
  product: windows
detection:
  selection:
    LogonType: "10"
    User|contains: "@"
  condition: selection
level: medium
tags:
  - attack.lateral-movement
  - attack.t1021
  - attack.credential-access
