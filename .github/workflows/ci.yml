name: CI

on:
  push:
    branches: ["**"]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: backend (lint + tests)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: cybercat
          POSTGRES_PASSWORD: cybercat_dev
          POSTGRES_DB: cybercat
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U cybercat"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql+asyncpg://cybercat:cybercat_dev@localhost:5432/cybercat
      REDIS_URL: redis://localhost:6379/0
      AUTH_REQUIRED: "false"
      WAZUH_BRIDGE_ENABLED: "false"
      WAZUH_AR_ENABLED: "false"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install backend deps
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run alembic migrations
        working-directory: backend
        run: alembic upgrade head

      - name: Ruff lint
        working-directory: backend
        run: ruff check app/

      - name: Pytest (backend)
        working-directory: backend
        run: pytest tests/ -v

  agent:
    name: agent (lint + tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install agent deps
        working-directory: agent
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff lint
        working-directory: agent
        run: ruff check cct_agent/

      - name: Pytest (agent)
        working-directory: agent
        # Skip cross-project tests that depend on the backend package being importable.
        run: |
          pytest tests/ \
            --ignore=tests/test_events_network.py \
            --ignore=tests/test_events_process.py \
            -v

  frontend:
    name: frontend (typecheck + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        working-directory: frontend
        run: npm ci

      - name: Typecheck
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Build
        working-directory: frontend
        run: npm run build
        env:
          # Avoid Next.js telemetry calls during CI
          NEXT_TELEMETRY_DISABLED: "1"
