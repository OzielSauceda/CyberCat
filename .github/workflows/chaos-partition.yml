name: Chaos — Network Partition Agent (Phase 19.5 §A3)

# Phase 19.5 scenario A3: disconnect cct-agent from the compose network
# for 60s. Reconnect. Assert ≥80% of partition-window events eventually
# land in the events table after the shipper drains its retry queue.
#
# Plan substitution: original roadmap called for `iptables` to drop port
# 8000. iptables needs CAP_NET_ADMIN, unavailable on ubuntu-latest.
# Substituted with `docker network disconnect` — functionally equivalent
# at the container level. See docs/phase-19.5-plan.md § "Calibration".
#
# Trigger this manually from the Actions tab.

on:
  workflow_dispatch:
    inputs:
      partition_at:
        description: 'Seconds before disconnect'
        required: false
        default: '10'
      partition_duration:
        description: 'Seconds the agent stays disconnected'
        required: false
        default: '60'
      emit_duration:
        description: 'Seconds the sshd-event emitter runs'
        required: false
        default: '90'
      drain_settle:
        description: 'Seconds to wait post-heal for shipper retry drain'
        required: false
        default: '30'
      acceptance_threshold_pct:
        description: 'Minimum acceptance percentage (events landed / events emitted)'
        required: false
        default: '80'

concurrency:
  group: chaos-partition-${{ github.ref }}
  cancel-in-progress: true

jobs:
  partition-agent:
    name: docker network disconnect cct-agent for 60s
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install httpx
        run: pip install "httpx>=0.27"

      - name: Bring up agent-profile stack
        run: |
          bash start.sh
          for i in $(seq 1 60); do
            if curl -sf http://localhost:8000/healthz > /dev/null 2>&1; then
              echo "backend healthz OK"
              break
            fi
            sleep 2
          done
          docker compose -f infra/compose/docker-compose.yml --profile agent ps

      - name: Run scenario A3 (partition_agent.sh)
        env:
          PARTITION_AT: ${{ inputs.partition_at }}
          PARTITION_DURATION: ${{ inputs.partition_duration }}
          EMIT_DURATION: ${{ inputs.emit_duration }}
          DRAIN_SETTLE: ${{ inputs.drain_settle }}
          ACCEPTANCE_THRESHOLD_PCT: ${{ inputs.acceptance_threshold_pct }}
        run: bash labs/chaos/scenarios/partition_agent.sh

      - name: Capture backend / agent / lab-debian logs on failure
        if: failure()
        run: |
          cd infra/compose
          docker compose --profile agent logs backend cct-agent lab-debian --tail 300

      - name: Tear down
        if: always()
        run: |
          cd infra/compose
          docker compose --profile agent down -v
