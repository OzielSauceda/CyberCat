name: Chaos — Redis Kill (Phase 19 §A1)

# Phase 19 verification item #2: the §A1 acceptance test (kill Redis mid-run,
# system degrades gracefully) was never re-run on Linux because the developer
# host is Windows + WSL2, where `getaddrinfo("redis")` against a removed
# container takes ~3.6s to return NXDOMAIN — that platform quirk is not
# reproducible on native Linux. This workflow runs the recipe on a Linux
# runner so we can close the verification item honestly.
#
# Trigger this manually from the Actions tab once the workflow file is on main.
#
# Pass criteria — match the plan §A1 acceptance bar exactly (docs/phase-19-plan.md
# line 67): "killing Redis ... does not raise; events land in Postgres; one
# degraded-mode warning log appears." Specifically:
#   1. No unhandled Python `Traceback` in sim.log or backend logs.
#   2. Events landed in the `events` table during/after the chaos window
#      (we count rows ingested in the last 5 minutes — must be > 0).
#   3. At least one degraded-mode warning in backend logs (proves the
#      resilience layer fired and we didn't just get lucky).
#
# Note: the simulator runs with --no-verify here. The simulator's --verify
# post-condition asserts the expected incident *tree* was created — but
# events fired during the Redis outage will miss correlation (the correlator
# needs Redis windowed state), which is the documented degraded behavior,
# not a failure. Demanding --verify to pass during chaos conflates §A1's
# graceful-degradation bar with the stricter "system runs perfectly through
# any failure" bar that no realistic resilience model claims.
#
# Eval helpers: this workflow sources `labs/chaos/lib/evaluate.sh` so the
# four §A1 counters (sim_tracebacks / backend_tracebacks / event_count_5min /
# degraded_warnings) are computed by the same helper functions the local
# A1–A6 scenario scripts use. Single source of truth for what "graceful
# degradation" means in this project.

on:
  workflow_dispatch:
    inputs:
      speed:
        description: 'Simulator --speed factor (0.1 ≈ 30s compressed run)'
        required: false
        default: '0.1'
      kill_at:
        description: 'Seconds after simulator start to kill redis'
        required: false
        default: '4'
      restore_after:
        description: 'Seconds redis stays dead before being restored'
        required: false
        default: '25'

concurrency:
  group: chaos-redis-${{ github.ref }}
  cancel-in-progress: true

jobs:
  redis-kill:
    name: simulator + docker compose kill redis
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python + install host-side simulator deps
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install httpx
        # The simulator drives the backend over HTTP from the host.
        run: pip install "httpx>=0.27"

      - name: Bring up agent-profile stack (start.sh provisions token)
        run: |
          bash start.sh
          # start.sh already waits for the backend and writes
          # CCT_AGENT_TOKEN into infra/compose/.env. A second readiness loop
          # here gives the auto-seed a chance to settle before we hammer it.
          for i in $(seq 1 60); do
            if curl -sf http://localhost:8000/healthz > /dev/null 2>&1; then
              echo "backend healthz OK"
              break
            fi
            sleep 2
          done
          docker compose -f infra/compose/docker-compose.yml --profile agent ps

      - name: Read CCT_AGENT_TOKEN from .env
        id: token
        run: |
          tok=$(grep '^CCT_AGENT_TOKEN=' infra/compose/.env | head -1 | cut -d= -f2-)
          if [ -z "$tok" ]; then
            echo "::error::CCT_AGENT_TOKEN missing from infra/compose/.env after start.sh"
            exit 1
          fi
          # Mask the token in any subsequent log output and pass it via env.
          echo "::add-mask::$tok"
          echo "token=$tok" >> "$GITHUB_OUTPUT"

      # NOTE: deliberately *not* calling DELETE /v1/admin/demo-data here.
      # That endpoint requires `admin` role; the cct-agent token bootstrapped
      # by start.sh is `analyst` (see start.sh:128). The simulator's --verify
      # filters incidents by primary_user="alice" + scenario-specific kinds,
      # so auto-seed scenarios (which use different users) won't false-positive.

      - name: Run scenario + kill Redis mid-run
        id: chaos
        env:
          SIM_TOKEN: ${{ steps.token.outputs.token }}
          SPEED: ${{ inputs.speed }}
          KILL_AT: ${{ inputs.kill_at }}
          RESTORE_AFTER: ${{ inputs.restore_after }}
        run: |
          # Trace mode: echo every command before bash runs it. Combined with
          # explicit "CHECKPOINT" markers below, this makes every step of the
          # script visible in the log even if a later command silently exits.
          # We deliberately do NOT enable `-e` — the script must continue
          # through expected failures (psql errors, grep no-match) so the
          # §A1 evaluation can run even when one signal is missing.
          set -x
          set -uo pipefail

          # Source shared chaos eval helpers — same functions used by the
          # local labs/chaos/scenarios/*.sh scripts. Sourcing (vs. running)
          # injects the functions into THIS step's shell scope; they will not
          # carry over to later workflow steps.
          # shellcheck source=labs/chaos/lib/evaluate.sh
          . labs/chaos/lib/evaluate.sh

          echo "CHECKPOINT 1: script entered  $(date -Is)"

          # Start simulator in background. --no-verify because the §A1 bar is
          # graceful degradation, not "incident tree forms during chaos" — see
          # the file-header comment above.
          python -m labs.simulator \
            --scenario credential_theft_chain \
            --speed "$SPEED" \
            --api http://localhost:8000 \
            --token "$SIM_TOKEN" \
            --no-verify \
            > sim.log 2>&1 &
          SIM_PID=$!
          echo "CHECKPOINT 2: simulator backgrounded  PID=$SIM_PID"

          # Wait briefly for the simulator to start firing, then kill Redis.
          sleep "$KILL_AT"
          echo "CHECKPOINT 3: pre-kill window over (slept $KILL_AT s)"

          # No `::group::` here — groups collapse in the UI and have been
          # making the failure cause invisible. Print everything inline.
          echo "----- kill redis -----"
          docker compose -f infra/compose/docker-compose.yml --profile agent kill redis || true
          docker compose -f infra/compose/docker-compose.yml --profile agent ps || true
          echo "CHECKPOINT 4: redis killed  $(date -Is)"

          # Hold Redis down long enough that the simulator definitely tries
          # several events against the dead Redis (each event would normally
          # touch Redis for cooldowns / dedupe / streams).
          sleep "$RESTORE_AFTER"
          echo "CHECKPOINT 5: dead-redis window over (slept $RESTORE_AFTER s)"

          echo "----- restore redis -----"
          docker compose -f infra/compose/docker-compose.yml --profile agent up -d redis || true
          echo "CHECKPOINT 6: redis restored  $(date -Is)"

          # Wait for the simulator to finish. `wait` in bash returns the exit
          # status of the awaited PID; with `set -u` and no `set -e`, a
          # non-zero return DOES NOT abort the script — but a missing
          # SIM_PID variable would. Belt-and-suspenders: default it.
          : "${SIM_PID:=0}"
          if [ "$SIM_PID" -gt 0 ]; then
            wait "$SIM_PID" || true
            SIM_EXIT=$?
          else
            SIM_EXIT=99
          fi
          echo "CHECKPOINT 7: wait returned  SIM_EXIT=$SIM_EXIT"

          # Dump full sim.log inline (no collapsed group) so the failure reason
          # is visible directly in the step log, not buried in an artifact.
          echo "================================================================"
          echo "  sim.log (full)"
          echo "================================================================"
          cat sim.log || true
          echo "================================================================"
          echo "  end sim.log"
          echo "================================================================"

          # Backend logs from the chaos window (always print, not just on failure)
          # so the §A1 acceptance evidence is visible in the green run too.
          # capture_backend_log() writes to backend.log via the shared helper —
          # same shape the local A1–A6 scripts use.
          echo "================================================================"
          echo "  backend logs (last 250 lines)"
          echo "================================================================"
          capture_backend_log backend.log 250
          cat backend.log || true
          echo "================================================================"
          echo "  end backend logs"
          echo "================================================================"

          # ----- §A1 acceptance evaluation ---------------------------------
          # Per docs/phase-19-plan.md line 67:
          #   "killing Redis ... does not raise; events land in Postgres;
          #    one degraded-mode warning log appears."
          #
          # The four counters below come from labs/chaos/lib/evaluate.sh —
          # same helpers the local scenario scripts use, so CI and local A1
          # report the same shape and apply the same pass/fail criteria.

          echo "CHECKPOINT 8: starting §A1 evaluation"

          # Criterion 1: no unhandled tracebacks (sim or backend).
          SIM_TRACEBACKS=$(count_traceback_lines sim.log)
          BACKEND_TRACEBACKS=$(count_traceback_lines backend.log)

          # Criterion 2: events landed in Postgres during the chaos window
          # (last 5 minutes; helper queries inside the postgres container).
          EVENT_COUNT=$(count_postgres_events_5min)

          # Criterion 3: at least one degraded-mode warning fired (proves the
          # resilience layer activated, not just lucky timing). Pattern stays
          # inline here — A1 has its own log shapes; helper takes the regex
          # so each scenario can pass its own.
          DEGRADED_LINES=$(count_degraded_warnings backend.log \
            "redis_degraded|redis_state=unavailable|degraded mode|EventBus consumer crashed")

          print_acceptance_summary "$SIM_TRACEBACKS" "$BACKEND_TRACEBACKS" "$EVENT_COUNT" "$DEGRADED_LINES"
          echo "  simulator_exit     = $SIM_EXIT  (informational)"
          echo "================================================================"

          FAIL=0
          if [ "$SIM_TRACEBACKS" -gt 0 ]; then
            echo "::error title=Unhandled exception in simulator::sim.log contains $SIM_TRACEBACKS Python traceback(s) — simulator crashed instead of degrading gracefully."
            FAIL=1
          fi
          if [ "$BACKEND_TRACEBACKS" -gt 0 ]; then
            echo "::error title=Unhandled exception in backend::backend logs contain $BACKEND_TRACEBACKS Python traceback(s) — resilience layer didn't catch."
            FAIL=1
          fi
          if [ "$EVENT_COUNT" -le 0 ]; then
            echo "::error title=No events landed::events table shows 0 rows in the last 5 min — ingest path didn't survive the chaos."
            FAIL=1
          fi
          if [ "$DEGRADED_LINES" -le 0 ]; then
            echo "::error title=No degraded-mode warning::backend logs show no degraded-mode warning — resilience layer didn't activate (or the chaos didn't actually hit the right code path)."
            FAIL=1
          fi

          if [ "$FAIL" -ne 0 ]; then
            exit 1
          fi
          echo "PASS: §A1 acceptance met — no tracebacks, events ingested, degraded-mode active."

      - name: Upload simulator log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: chaos-redis-sim-log
          path: sim.log
          if-no-files-found: ignore
          retention-days: 7

      - name: Capture backend / agent logs on failure
        if: failure()
        run: |
          cd infra/compose
          docker compose --profile agent logs backend cct-agent --tail 300

      - name: Tear down
        if: always()
        run: |
          cd infra/compose
          docker compose --profile agent down -v
