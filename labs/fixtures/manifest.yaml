# Detection-as-code regression manifest (Phase 19).
#
# Each entry binds a JSONL fixture under labs/fixtures/ to the detector rule IDs
# that MUST fire and MUST NOT fire when the fixture is replayed against a clean
# stack. Adding a new detector requires adding both:
#   - a positive fixture (proves it fires on intended input), and
#   - at least one benign fixture in must_not_fire (proves no false-positive baseline).
#
# Fixture lines carry `_t_offset_sec` — the replay harness computes
# `occurred_at = now() - _t_offset_sec` so timestamps are always recent.
#
# Setup: which seed actions to run before replaying. Currently supported:
#   - block_observable: list of {value, kind} to insert into blocked_observables
#     (used for the bad-IP beacon test).

- fixture: auth/ssh_brute_force_burst.jsonl
  must_fire: [py.auth.failed_burst]
  must_not_fire: [py.auth.anomalous_source_success, py.process.suspicious_child, py.blocked_observable_match]

- fixture: auth/successful_login_clean.jsonl
  must_fire: []
  must_not_fire: [py.auth.failed_burst, py.auth.anomalous_source_success]

- fixture: auth/successful_login_anomalous.jsonl
  must_fire: [py.auth.anomalous_source_success]
  must_not_fire: [py.process.suspicious_child]

- fixture: process/benign_apt_update.jsonl
  must_fire: []
  must_not_fire: [py.process.suspicious_child, py.blocked_observable_match]

- fixture: process/encoded_powershell.jsonl
  must_fire: [py.process.suspicious_child]
  must_not_fire: [py.auth.failed_burst]

- fixture: process/curl_pipe_sh.jsonl
  # File still named for the original Linux-style intent; the actual canonical
  # fixture exercises Branch 2 (office binary spawning cmd.exe) which is what
  # the detector matches today. Rename if/when a Linux process branch is added.
  must_fire: [py.process.suspicious_child]
  must_not_fire: [py.auth.failed_burst]

- fixture: network/benign_outbound.jsonl
  must_fire: []
  must_not_fire: [py.blocked_observable_match]

- fixture: network/known_bad_ip_beacon.jsonl
  setup:
    block_observable:
      - {value: "198.51.100.66", kind: "ip"}
  must_fire: [py.blocked_observable_match]
  must_not_fire: [py.auth.failed_burst, py.process.suspicious_child]

# --- Phase 20 §A1: lateral_movement_chain ---
# Linux brute-force → login → 2-hop SSH pivot (host-1 → host-2 → host-3) with
# curl|sh persistence on host-2.
#
# Detector reality (current platform state — see docs/phase-20-plan.md §A1
# "Likely gap"): py.process.suspicious_child has no Linux sshd→bash→ssh branch
# (backend/app/detection/rules/process_suspicious_child.py:14-25 covers
# encoded-PowerShell, Office→shell, rundll32+script only). The chain stages
# are present in the fixture as evidence — they're the Phase 22 LotL detector
# input — but no current detector matches them.
- fixture: scenario/lateral_movement_chain.jsonl
  must_fire: [py.auth.failed_burst, py.auth.anomalous_source_success]
  must_not_fire: [py.process.suspicious_child, py.blocked_observable_match]

# --- Phase 20 §A2: crypto_mining_payload ---
# Linux cryptojacking — bash→curl xmrig → chmod → mining process → pool beacon.
# Pool IP (198.51.100.77) is pre-seeded into blocked_observables so the network
# beacon (and the cmdline reference at stage 4) trip blocked_observable_match.
#
# Detector reality (current platform state — see docs/phase-20-plan.md §A2
# scenario notes):
#   * py.process.suspicious_child has no Linux bash→curl|sh / bash→chmod branch
#     (same gap as A1; backend/app/detection/rules/process_suspicious_child.py).
#   * py.blocked_observable_match fires on stage 4 (cmdline contains pool IP)
#     and stage 5 (dst_ip = pool IP). The detector returns on first match per
#     event so there is one Detection per matching event.
- fixture: scenario/crypto_mining_payload.jsonl
  setup:
    block_observable:
      - {value: "198.51.100.77", kind: "ip"}
  must_fire: [py.blocked_observable_match]
  must_not_fire: [py.process.suspicious_child, py.auth.failed_burst, py.auth.anomalous_source_success]

# --- Phase 20 §A3: webshell_drop ---
# Linux web-shell scenario — inbound HTTP → .php on disk → apache2 spawns
# id/cat/wget child processes (the web shell executing attacker commands).
#
# Detector reality (current platform state — see docs/phase-20-plan.md §A3):
#   * py.process.suspicious_child has no apache2→child branch (Windows-only
#     branches: encoded PowerShell, Office→shell, rundll32+script).
#   * No detector matches inbound network.connection or .php file.created
#     in a web root — both are Phase 22+ candidates.
#
# Outcome: every detector silent. Empty must_fire is intentional. The
# manifest entry asserts the gap (must_not_fire) so any future detector
# addition that closes the gap fails the test until the manifest is updated.
- fixture: scenario/webshell_drop.jsonl
  must_fire: []
  must_not_fire: [py.process.suspicious_child, py.auth.failed_burst, py.auth.anomalous_source_success, py.blocked_observable_match]

# --- Phase 20 §A4: ransomware_staging ---
# Linux ransomware-staging — find docs → tar archive → 30-file .encrypted
# burst (synthetic; no real files written, per CLAUDE.md §8) → rm originals.
#
# Detector reality (current platform state — see docs/phase-20-plan.md §A4):
#   * py.process.suspicious_child has no Linux bash→find/tar/rm branch
#     (same gap as A1+A2+A3).
#   * No file-creation-burst detector exists. The 30-file burst over a 60s
#     window is the canonical signal a Phase 22 detector would catch.
#   * No auth events; no pre-blocked observables.
#
# Outcome: every detector silent. The choreography exists to demonstrate
# the burst pattern; the manifest's must_not_fire encodes the gap as a
# regression contract until Phase 22 lands the burst detector.
- fixture: scenario/ransomware_staging.jsonl
  must_fire: []
  must_not_fire: [py.process.suspicious_child, py.auth.failed_burst, py.auth.anomalous_source_success, py.blocked_observable_match]

# --- Phase 20 §A5: cloud_token_theft_lite ---
# Cloud credential theft — bash→cat AWS creds → bash→curl POST to exfil host
# (198.51.100.88, pre-seeded into blocked_observables) → outbound network
# connection → attacker uses stolen tokens cleanly from cloud-NAT-IP.
#
# Detector reality (current platform state — see docs/phase-20-plan.md §A5
# scenario notes):
#   * py.process.suspicious_child has no Linux bash→cat / bash→curl branch
#     (5th confirmation of the recurring gap; A1+A2+A3+A4+A5).
#   * py.blocked_observable_match fires twice — stage 2 (cmdline contains
#     exfil IP) and stage 3 (dst_ip = exfil IP). Detector returns on first
#     match per event so it's recorded as 2 separate Detection rows.
#   * py.auth.anomalous_source_success does NOT fire on the stage-4 cloud
#     login. Detector requires recent auth.failed events for the user
#     (auth_anomalous_source_success.py:36-42 — gates on failure_count >= 1).
#     Clean cred theft (no brute force precedent) slips past it. NEW
#     Phase 22 input: identity-baseline detector ("first time user has
#     ever logged in from this IP") would catch this attack pattern.
- fixture: scenario/cloud_token_theft_lite.jsonl
  setup:
    block_observable:
      - {value: "198.51.100.88", kind: "ip"}
  must_fire: [py.blocked_observable_match]
  must_not_fire: [py.process.suspicious_child, py.auth.failed_burst, py.auth.anomalous_source_success]
