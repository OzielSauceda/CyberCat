- id: linux_file_burst_encrypt
  name: File-burst rename (ransomware-shape)
  description: |
    Stages 30 dummy files in /tmp/loot/ and renames each to <name>.encrypted
    over a ~60-second window. Models the volumetric file-creation signature
    a real ransomware loader leaves on disk. Phase 21 expects no detection
    (Gap 4, A4 evidence). Phase 22 candidate: file_burst_detector with a
    Redis sliding-window per host keyed on suffix or shared parent dir.
  tactic: impact
  technique:
    attack_id: T1486
    name: Data Encrypted for Impact
  platforms:
    linux:
      sh:
        command: |
          mkdir -p /tmp/loot
          for i in $(seq 1 30); do
              touch "/tmp/loot/f${i}.txt"
              mv "/tmp/loot/f${i}.txt" "/tmp/loot/f${i}.txt.encrypted"
              sleep 2
          done
        cleanup: |
          # Strict cleanup — without this, lab-debian accumulates loot
          # across runs and the scorecard stops being reproducible.
          rm -rf /tmp/loot
