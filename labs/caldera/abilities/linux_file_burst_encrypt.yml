- id: linux_file_burst_encrypt
  name: File-burst rename (ransomware-shape)
  description: |
    Stages 30 dummy files in /tmp/loot/ and renames each to <name>.encrypted
    over a ~60-second window. Models the volumetric file-creation signature
    a real ransomware loader leaves on disk. Phase 21 expects no detection
    (Gap 4, A4 evidence). Phase 22 candidate: file_burst_detector with a
    Redis sliding-window per host keyed on suffix or shared parent dir.
  tactic: impact
  technique:
    attack_id: T1486
    name: Data Encrypted for Impact
  platforms:
    linux:
      sh:
        # NOTE: Caldera 4.2.0 strips literal newlines from a command
        # before dispatching it to Sandcat. Multi-line YAML block
        # scalars (`|`) get joined into one line WITHOUT separators —
        # `mkdir -p /tmp/loot\nfor i in...` becomes `mkdir -p /tmp/lootfor`
        # which bash parses as `mkdir -p /tmp/lootfor` (a directory named
        # 'lootfor') and then the bare `for` clause is a syntax error.
        # Workaround: write the entire command as a single line with
        # explicit `;` separators so newline-stripping is a no-op. The
        # YAML stays readable by indenting parts with " ; ".
        command: |
          mkdir -p /tmp/loot ; for i in $(seq 1 30) ; do touch "/tmp/loot/f${i}.txt" ; mv "/tmp/loot/f${i}.txt" "/tmp/loot/f${i}.txt.encrypted" ; sleep 2 ; done
        cleanup: |
          rm -rf /tmp/loot
