- id: linux_useradd_persist
  name: useradd backdoor account
  description: |
    Creates a new local user account ("backdoor") for persistence. A
    minimal version of T1098 (Account Manipulation) — useradd is the
    Linux primitive most attackers reach for after gaining root. Phase
    21 expects no detection. Phase 22 candidate: a detector that fires
    on any useradd or passwd execve where the target user did not exist
    in the per-host baseline.
  tactic: persistence
  technique:
    attack_id: T1098
    name: Account Manipulation
  platforms:
    linux:
      sh:
        # Caldera 4.2.0 strips literal newlines (see linux_file_burst_encrypt
        # for the full explanation). The original multi-line if-block
        # collapsed and bash treated `useradd ... echo ...` as one
        # mangled command. Rewritten as a single-line if-then-fi block;
        # bash's `;` placement is required between then/fi and statements.
        # Idempotent: skip if backdoor already exists from a prior run.
        command: |
          if ! id -u backdoor >/dev/null 2>&1 ; then useradd -m -s /bin/bash backdoor || true ; echo 'backdoor:phase21BackdoorPwd' | chpasswd || true ; fi
        cleanup: |
          if id -u backdoor >/dev/null 2>&1 ; then userdel -r backdoor 2>/dev/null || true ; fi
